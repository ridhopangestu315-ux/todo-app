<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>To-Do Dashboard</title>
  <link rel="stylesheet" href="home.css">
  
</head>
<body>

  <main class="container">
    <aside class="sidebar">
      <h2 class="logo">To-Do list</h2>
      <nav>
        <ul>
          <li class="active">Dashboard</li>
          <li>Tugas</li>
          <li>Kalender</li>
          <li>Pengaturan</li>
        </ul>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Selamat Datang Mahasiswa 👋</h1>
        <div class="profile">🧑‍🦰</div>
      </header>

      <section class="start">
        <div class="card blue">
          <p>Total Tugas</p>
          <h2>5</h2>
        </div>

        <div class="card yellow">
          <p>Belum Selesai</p>
          <h2>3</h2>
        </div>

          <div class="card green">
            <p>Selesai</p>
            <h2>2</h2>
          </div>

          <div class="card red">
            <p>Deadline Dekat</p>
            <h2>1</h2>
          </div>
      </section>
    </main>
</body>
</html>
